version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: snaplink-mysql
    environment:
      MYSQL_DATABASE: snaplink
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-defaultpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

  redis-cache:
    image: redis:7-alpine
    container_name: snaplink-redis
    ports:
      - "6379:6379"
    restart: always

  backend-api:
    build: ./Snaplink
    container_name: snaplink-backend
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/snaplink?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-defaultpassword}
      SPRING_DATA_REDIS_HOST: redis-cache
      SPRING_DATA_REDIS_PORT: 6379
      APP_BASE_URL: http://localhost:8082
      APP_FRONTEND_URL: http://localhost:5173
    depends_on:
      - mysql-db
      - redis-cache
    restart: always

  frontend-client:
    build:
      context: ./SnapLinkFrontend
      args:
        - VITE_API_BASE_URL=http://localhost:8082/api
        - VITE_SHORT_LINK_BASE_URL=http://localhost:8082
    container_name: snaplink-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend-api
    restart: always

volumes:
  mysql_data:
